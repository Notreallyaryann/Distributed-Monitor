services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: monitor
      POSTGRES_PASSWORD: monitor
      POSTGRES_DB: monitor_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monitor -d monitor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    ports:
      - "6432:5432"
    environment:
      DB_HOST: postgres           
      DB_PORT: 5432              
      DB_USER: monitor           
      DB_PASSWORD: monitor        
      DB_NAME: monitor_db        
      POOL_MODE: transaction      
      MAX_CLIENT_CONN: 200        
      DEFAULT_POOL_SIZE: 20      
      MIN_POOL_SIZE: 5            
      RESERVE_POOL_SIZE: 5        
      RESERVE_POOL_TIMEOUT: 3    
      AUTH_TYPE: scram-sha-256  
    depends_on:
      postgres:
        condition: service_healthy
    restart: always 