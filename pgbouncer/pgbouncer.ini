[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 100
min_pool_size = 20
reserve_pool_size = 20
reserve_pool_timeout = 3
ignore_startup_parameters = extra_float_digits
admin_users = monitor

[databases]
monitor_db = host=postgres port=5432 dbname=monitor_db user=monitor password=monitor
